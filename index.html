<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Silent DJ</title>
    <style>
        body { background: #0a0a0a; color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; touch-action: manipulation; }
        #ui-layer { text-align: center; z-index: 10; background: rgba(15,15,15,0.95); padding: 30px; border-radius: 15px; border: 1px solid #00d1b2; position: absolute; box-shadow: 0 0 30px rgba(0,209,178,0.3); min-width: 280px; }
        canvas { background: #050505; border-bottom: 4px solid #00d1b2; width: 100%; max-width: 800px; }
        .stats { position: absolute; top: 20px; left: 20px; font-size: 18px; font-weight: bold; color: #00d1b2; }
        #best-label { color: #ffd700; font-size: 14px; }
        #cheat-indicator { color: #ff0077; font-size: 12px; font-weight: normal; display: none; margin-top: 5px; }
        .controls { position: fixed; bottom: 30px; display: none; gap: 40px; z-index: 5; }
        .action-btn { width: 95px; height: 95px; background: rgba(0, 209, 178, 0.2); border: 3px solid #00d1b2; border-radius: 50%; color: white; font-weight: bold; font-size: 16px; outline: none; -webkit-tap-highlight-color: transparent; }
        #jumpBtn { background: rgba(0, 209, 178, 0.5); box-shadow: 0 0 20px rgba(0,209,178,0.4); }
        .action-btn:active { background: rgba(0, 209, 178, 0.8); }
        button.menu-btn { padding: 12px 30px; font-size: 16px; cursor: pointer; background: #00d1b2; border: none; border-radius: 30px; color: white; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="stats">
        SCORE: <span id="score">0</span><br>
        <div id="best-label">BEST: <span id="best-score">0</span></div>
        <div id="cheat-indicator">GHOST MODE: ACTIVE</div>
    </div>

    <div id="ui-layer">
        <h1 id="title">SILENT DJ</h1>
        <p><b>JUMP</b> spikes 🔼 | <b>DUCK</b> drones 🔽</p>
        <button id="startBtn" class="menu-btn">START GAME</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div class="controls" id="controls">
        <button class="action-btn" id="jumpBtn">JUMP</button>
        <button class="action-btn" id="duckBtn">DUCK</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const controls = document.getElementById('controls');

        // --- 1. PLAYLIST SETUP ---
        //MUSIC
        const playlist = [
            'https://github.com/CARZZYAPPS/music/raw/refs/heads/main/Bekitcha.mp3',
            'https://github.com/CARZZYAPPS/music/raw/refs/heads/main/Hershy%20Weinberger%20and%20Shmueli%20Ungar%20-%20RTVT.mp3'
            'https://github.com/CARZZYAPPS/music/raw/refs/heads/main/Yerushalayim.mp3'
        ];
        let currentTrackIndex = 0;
        const bgMusic = new Audio(playlist[currentTrackIndex]);
        bgMusic.volume = 0.3;

        bgMusic.addEventListener('ended', () => {
            currentTrackIndex = (currentTrackIndex + 1) % playlist.length;
            bgMusic.src = playlist[currentTrackIndex];
            bgMusic.play();
        });

        // --- 2. CHEAT SETUP ---
        let ghostMode = false;
        let inputBuffer = "";
        const cheatCode = "G";

        let gameActive = false, score = 0, bestScore = localStorage.getItem('rr_best_pro') || 0;
        document.getElementById('best-score').innerText = bestScore;

        let player = { x: 60, y: 0, w: 35, h: 45, baseH: 45, dy: 0, jumpPower: -15, grounded: true, isDucking: false };
        let obstacles = [], gravity = 0.8, groundY = 0;
        let gameSpeed = 6.5, spawnTimer = 0;
        let isJumpKeyPressed = false;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = 350;
            groundY = canvas.height - 50;
            player.y = groundY - player.h;
        }
        window.onresize = resize;
        resize();

        function jump() {
            if (player.grounded && gameActive && !player.isDucking && !isJumpKeyPressed) {
                player.dy = player.jumpPower;
                player.grounded = false;
                isJumpKeyPressed = true; 
            }
        }

        function toggleDuck(ducking) {
            if (!player.grounded && ducking) return; 
            player.isDucking = ducking;
            player.h = ducking ? 22 : player.baseH;
            player.y = groundY - player.h;
        }

        window.addEventListener('keydown', (e) => {
            if (e.code === 'ArrowUp' || e.code === 'Space') jump();
            if (e.code === 'ArrowDown') toggleDuck(true);

            // Cheat Detector
            inputBuffer += e.key.toUpperCase();
            if (inputBuffer.includes(cheatCode)) {
                ghostMode = !ghostMode;
                inputBuffer = "";
                document.getElementById('cheat-indicator').style.display = ghostMode ? 'block' : 'none';
            }
            if (inputBuffer.length > 10) inputBuffer = inputBuffer.substring(1);
        });

        window.addEventListener('keyup', (e) => {
            if (e.code === 'ArrowUp' || e.code === 'Space') isJumpKeyPressed = false;
            if (e.code === 'ArrowDown') toggleDuck(false);
        });

        document.getElementById('jumpBtn').ontouchstart = (e) => { e.preventDefault(); jump(); };
        document.getElementById('jumpBtn').ontouchend = (e) => { e.preventDefault(); isJumpKeyPressed = false; };
        document.getElementById('duckBtn').ontouchstart = (e) => { e.preventDefault(); toggleDuck(true); };
        document.getElementById('duckBtn').ontouchend = (e) => { e.preventDefault(); toggleDuck(false); };

        function update() {
            if (!gameActive) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            ctx.strokeStyle = "rgba(0, 209, 178, 0.5)";
            ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(0, groundY); ctx.lineTo(canvas.width, groundY); ctx.stroke();

            spawnTimer++;
            let nextSpawn = Math.floor(Math.random() * (85 - 35) + 35); 
            if (spawnTimer > Math.max(nextSpawn, 75 - gameSpeed)) { 
                const isDrone = Math.random() > 0.8; 
                obstacles.push({
                    x: canvas.width, w: 30,
                    h: isDrone ? 1000 : 45, 
                    y: isDrone ? groundY - 1030 : groundY - 45, 
                    visualY: isDrone ? groundY - 55 : groundY - 45,
                    type: isDrone ? 'drone' : 'spike',
                    passed: false
                });
                spawnTimer = 0;
            }

            for (let i = obstacles.length - 1; i >= 0; i--) {
                let o = obstacles[i];
                o.x -= gameSpeed;

                ctx.fillStyle = o.type === 'drone' ? "#ff0077" : "#00d1b2";
                if (o.type === 'drone') {
                    ctx.fillRect(o.x, o.visualY, o.w, 15);
                    ctx.fillStyle = "rgba(255, 0, 119, 0.3)";
                    ctx.fillRect(o.x - 10, o.visualY + 5, o.w + 20, 5); 
                } else {
                    ctx.beginPath();
                    ctx.moveTo(o.x, groundY);
                    ctx.lineTo(o.x + o.w/2, groundY - o.h);
                    ctx.lineTo(o.x + o.w, groundY);
                    ctx.fill();
                }

                // COLLISION WITH CHEAT CHECK
                if (!ghostMode) {
                    if (o.x < player.x + player.w && o.x + o.w > player.x && 
                        player.y < o.y + o.h && player.y + player.h > o.y) {
                        gameOver();
                    }
                }

                if (o.x + o.w < player.x && !o.passed) {
                    o.passed = true;
                    score += 10;
                    document.getElementById('score').innerText = score;
                    gameSpeed += 0.12;
                }
                if (o.x < -50) obstacles.splice(i, 1);
            }

            if (!player.grounded) {
                player.dy += gravity;
                player.y += player.dy;
            }
            if (player.y > groundY - player.h) {
                player.y = groundY - player.h;
                player.dy = 0;
                player.grounded = true;
            }

            // PLAYER DRAWING WITH GHOST OPACITY
            ctx.globalAlpha = ghostMode ? 0.4 : 1.0;
            ctx.shadowBlur = 10; ctx.shadowColor = "#00d1b2";
            ctx.fillStyle = player.isDucking ? "#008a76" : "#111";
            ctx.strokeStyle = "#00d1b2";
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.roundRect(player.x, player.y, player.w, player.h, 5);
            ctx.fill(); ctx.stroke();
            ctx.shadowBlur = 0;
            ctx.globalAlpha = 1.0;

            requestAnimationFrame(update);
        }

        function gameOver() {
            gameActive = false;
            bgMusic.pause();
            bgMusic.currentTime = 0;
            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('rr_best_pro', bestScore);
                document.getElementById('best-score').innerText = bestScore;
            }
            document.getElementById('ui-layer').style.display = 'block';
            document.getElementById('title').innerText = "💥💥YOU CRASHED💥💥";
            controls.style.display = 'none';
        }

        document.getElementById('startBtn').onclick = () => {
            score = 0; gameSpeed = 6.5; obstacles = [];
            document.getElementById('score').innerText = "0";
            document.getElementById('ui-layer').style.display = 'none';
            controls.style.display = 'flex';
            gameActive = true;
            bgMusic.play().catch(e => console.log("Audio blocked. Click Start to enable."));
            update();
        };
    </script>
</body>
</html>
